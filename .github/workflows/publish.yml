name: Publish

on:
  push:
    branches:
      - 'main'

permissions:
  id-token: write # Required for OIDC
  contents: read
  packages: write

jobs:
  publish-js:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install Mise
        uses: caido/action-mise-action@v3.2.0
        with:
          working_directory: .
          version: ${{ vars.CI__MISE_VERSION }}

      - name: Publish proxy
        run: |
          pnpm --filter schema-proxy publish --access public

  publish-py:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install Mise
        uses: caido/action-mise-action@v3.2.0
        with:
          working_directory: .
          version: ${{ vars.CI__MISE_VERSION }}

      - name: Publish proxy
        run: |
          uv build schemas/proxy
          output=$(uv publish --project schemas/proxy --check-url https://pypi.org/simple 2>&1) || status=$?
          echo "$output"
          if [ "$status" -ne 0 ]; then
            if echo "$output" | grep -qi "Local file and index file do not match"; then
              echo "This version is already on the index with a different artifact; treating as success."
              exit 0
            fi
            exit "$status"
          fi
